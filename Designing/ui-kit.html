<!doctype html>
<html lang="en" data-theme="light" data-density="comfortable" data-brand="teal">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>S. P. Gas Agency — UI Kit & Component Dictionary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body { background: var(--bg); }
  .kit-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 40px 80px; }
  .kit-head { display:flex; align-items:center; gap:16px; margin-bottom: 8px; }
  .kit-head .logo { width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--brand-600),var(--brand-800));color:#fff;display:grid;place-items:center;font-weight:800;letter-spacing:-.02em; }
  .kit-head h1 { margin:0; font-size:28px; letter-spacing:-0.02em; }
  .kit-head p { margin:4px 0 0; color: var(--text-2); font-size: 14px; }
  .kit-nav { position: sticky; top: 0; background: var(--bg); padding: 12px 0; z-index: 10; border-bottom: 1px solid var(--border); margin: 24px 0 32px; display:flex; gap:6px; flex-wrap:wrap; }
  .kit-nav a { padding: 6px 12px; border-radius: 999px; font-size:12px; color: var(--text-2); text-decoration:none; border:1px solid var(--border); background: var(--surface); font-weight:600; }
  .kit-nav a:hover { color: var(--brand-700); border-color: var(--brand-500); }
  .sec { margin: 56px 0; scroll-margin-top: 70px; }
  .sec h2 { margin: 0 0 4px; font-size: 22px; letter-spacing:-0.01em; }
  .sec .lead { color: var(--text-2); margin: 0 0 20px; font-size: 14px; max-width: 780px; }
  .sub-h { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-2); margin: 24px 0 10px; }
  .example { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .example .demo { padding: 24px; border-bottom: 1px solid var(--divider); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .example .demo.stack { flex-direction: column; align-items: stretch; }
  .example .meta { display:grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .example .meta > div { padding: 14px 18px; font-size: 12px; color: var(--text-2); line-height: 1.6; }
  .example .meta > div + div { border-left: 1px solid var(--divider); }
  .example .meta b { color: var(--text); font-weight: 600; display: block; font-size: 11px; text-transform: uppercase; letter-spacing:.05em; margin-bottom: 4px; }
  code.tok, kbd.tok { font-family: var(--font-mono); font-size: 11px; background: var(--surface-2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: var(--text); }
  .swatch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .sw { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); }
  .sw .chip { height: 56px; }
  .sw .lbl { padding: 8px 12px; font-size: 12px; }
  .sw .lbl .n { font-weight: 600; }
  .sw .lbl .h { font-family: var(--font-mono); color: var(--text-2); font-size: 11px; }
  .type-row { display: flex; align-items: baseline; gap: 24px; padding: 14px 18px; border-bottom: 1px solid var(--divider); }
  .type-row:last-child { border: 0; }
  .type-row .spec { width: 140px; font-family: var(--font-mono); font-size: 11px; color: var(--text-2); }
  .type-row .sample { flex: 1; color: var(--text); }
  .dict-tbl { width:100%; border-collapse: collapse; font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .dict-tbl th, .dict-tbl td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--divider); vertical-align: top; }
  .dict-tbl th { background: var(--surface-2); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-2); font-weight: 700; }
  .dict-tbl code { font-family: var(--font-mono); font-size: 11px; background: var(--surface-2); padding: 1px 5px; border-radius: 3px; }
  .rad-row { display: flex; gap: 16px; align-items: flex-end; }
  .rad-row .box { width: 80px; height: 80px; background: var(--surface-2); border: 1px solid var(--border-strong); }
  .rad-row .box .lbl { padding: 4px 6px; font-size: 10px; font-family: var(--font-mono); color: var(--text-2); }
  .sp-row { display: flex; align-items: flex-end; gap: 4px; }
  .sp-row .sp { background: var(--brand-200); }
  .sp-row .sp .lbl { display: block; font-size: 10px; font-family: var(--font-mono); color: var(--text-2); text-align: center; margin-top: 4px; }
  .princ { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .princ .p { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .princ .p .ic { width: 32px; height: 32px; border-radius: 8px; background: var(--brand-50); color: var(--brand-700); display: grid; place-items: center; margin-bottom: 10px; }
  .princ .p h4 { margin: 0 0 4px; font-size: 14px; font-weight: 700; }
  .princ .p p { margin: 0; font-size: 12px; color: var(--text-2); line-height: 1.5; }
  .do-dont { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .do-dont .col { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .do-dont h5 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase; letter-spacing:.06em; font-weight: 700; }
  .do-dont .do h5 { color: var(--ok-700); }
  .do-dont .dont h5 { color: var(--err-700); }
  .do-dont li { font-size: 12px; color: var(--text-2); padding: 3px 0; list-style: none; padding-left: 18px; position: relative; }
  .do-dont .do li::before { content:'✓'; color: var(--ok-600); position:absolute; left:0; font-weight:700; }
  .do-dont .dont li::before { content:'✕'; color: var(--err-600); position:absolute; left:0; font-weight:700; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel">
const { useState } = React;

const ModalDemo = () => {
  const [open, setOpen] = useState(false);
  return <>
    <button className="btn secondary" onClick={()=>setOpen(true)}>Open modal</button>
    {open && <Modal title="Delete customer?" onClose={()=>setOpen(false)}
      footer={<><button className="btn secondary" onClick={()=>setOpen(false)}>Cancel</button><button className="btn danger" onClick={()=>setOpen(false)}>Delete</button></>}>
      <p style={{margin:0, color:'var(--text-2)', fontSize:14}}>This will permanently delete <b>Manoj Patel</b> and all associated transactions. This action cannot be undone.</p>
    </Modal>}
  </>;
};

const DrawerDemo = () => {
  const [open, setOpen] = useState(false);
  return <>
    <button className="btn secondary" onClick={()=>setOpen(true)}>Open drawer</button>
    {open && <Drawer onClose={()=>setOpen(false)} width={440}>
      <div className="cd-hero">
        <div className="avatar">MP</div>
        <div style={{flex:1}}>
          <div className="n">Manoj Patel</div>
          <div className="m">Ranasan · 98765 43210</div>
        </div>
        <div className="right"><button className="btn secondary sm" onClick={()=>setOpen(false)}><Icon name="x" size={14}/></button></div>
      </div>
      <div className="cd-cards">
        <div className="cd-card warn"><div className="k">Total Due</div><div className="v">₹340</div></div>
        <div className="cd-card"><div className="k">Empty</div><div className="v">2</div></div>
        <div className="cd-card ok"><div className="k">Lifetime</div><div className="v">₹18,400</div></div>
      </div>
      <div className="empty" style={{flex:1}}><div className="glyph"><Icon name="doc" size={24}/></div><div>Transactions appear here</div></div>
    </Drawer>}
  </>;
};

const ToastDemo = () => {
  const toast = useToast();
  return <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
    <button className="btn secondary" onClick={()=>toast.push({kind:'ok', title:'Bill saved', msg:'#2448 · ₹4,382 · Manoj Patel'})}>Success toast</button>
    <button className="btn secondary" onClick={()=>toast.push({kind:'err', title:'Save failed', msg:'Check your connection and retry'})}>Error toast</button>
    <button className="btn secondary" onClick={()=>toast.push({kind:'warn', title:'Partial payment', msg:'Balance ₹1,200 added to dues'})}>Warn toast</button>
  </div>;
};

const CustSearchDemo = () => {
  const [q, setQ] = useState('man');
  const matches = SEED_CUSTOMERS.filter(c => c.name.toLowerCase().includes(q.toLowerCase()) || c.village.toLowerCase().includes(q.toLowerCase())).slice(0, 4);
  return <div style={{width:'100%', maxWidth:520, position:'relative'}}>
    <div className="input-with-icon">
      <span className="ii"><Icon name="search" size={16}/></span>
      <input className="input" value={q} onChange={e=>setQ(e.target.value)}/>
    </div>
    <div style={{position:'relative'}}>
      <div className="cust-dropdown" style={{position:'relative', top:4}}>
        {matches.map((c, i) => (
          <div key={c.id} className={`cust-opt ${i===0?'focused':''}`}>
            <div className="avatar">{initials(c.name)}</div>
            <div>
              <div className="n">{highlight(c.name, q)} — {highlight(c.village, q)}</div>
              <div className="s">{c.mobile} · {c.type}</div>
            </div>
            <div className="meta">
              {c.due > 0 ? <div style={{color:'var(--err-600)', fontWeight:600}}>{fmtINR(c.due)} due</div> : <div className="muted">No dues</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  </div>;
};

const Section = ({ id, title, lead, children }) => (
  <section className="sec" id={id}>
    <h2>{title}</h2>
    {lead && <p className="lead">{lead}</p>}
    {children}
  </section>
);

const Ex = ({ title, purpose, usage, children }) => (
  <div className="example">
    <div className="demo">{children}</div>
    <div className="meta">
      <div><b>Purpose</b>{purpose}</div>
      <div><b>When to use</b>{usage}</div>
    </div>
  </div>
);

const UIKit = () => (
  <div className="kit-wrap">
    <div className="kit-head">
      <div className="logo">SP</div>
      <div>
        <h1>UI Kit &amp; Component Dictionary</h1>
        <p>S. P. Gas Agency — Billing App · v1.0 · Use these patterns exactly, don't reinvent them.</p>
      </div>
      <div style={{marginLeft:'auto'}}>
        <a href="app.html" className="btn secondary">← Back to prototype</a>
      </div>
    </div>

    <nav className="kit-nav">
      <a href="#principles">Principles</a>
      <a href="#color">Color</a>
      <a href="#type">Typography</a>
      <a href="#spacing">Spacing</a>
      <a href="#radius">Radius &amp; Shadow</a>
      <a href="#icons">Icons</a>
      <a href="#buttons">Buttons</a>
      <a href="#inputs">Inputs</a>
      <a href="#selectors">Selectors</a>
      <a href="#badges">Badges</a>
      <a href="#cards">Cards</a>
      <a href="#tables">Tables</a>
      <a href="#empty">Empty &amp; Loading</a>
      <a href="#overlays">Overlays</a>
      <a href="#feedback">Feedback</a>
      <a href="#nav">Navigation</a>
      <a href="#domain">Domain Components</a>
      <a href="#dictionary">Full Dictionary</a>
    </nav>

    {/* ========== PRINCIPLES ========== */}
    <Section id="principles" title="Design Principles" lead="Every decision should ladder up to one of these. When principles conflict, speed wins.">
      <div className="princ">
        <div className="p"><div className="ic"><Icon name="clock" size={16}/></div><h4>Speed over Style</h4><p>Staff make 100+ bills a day. Every click, every extra character of typing, is cost.</p></div>
        <div className="p"><div className="ic"><Icon name="gear" size={16}/></div><h4>Keyboard First</h4><p>Desktop users must be able to create a bill without touching the mouse. Tab order matters.</p></div>
        <div className="p"><div className="ic"><Icon name="eye" size={16}/></div><h4>Clarity</h4><p>Numbers, names, statuses — instantly readable. Tabular numerals. High contrast.</p></div>
        <div className="p"><div className="ic"><Icon name="save" size={16}/></div><h4>Forgiving</h4><p>Auto-save drafts. Confirm destructive actions. Undo where possible.</p></div>
        <div className="p"><div className="ic"><Icon name="home" size={16}/></div><h4>Familiar</h4><p>Feels like Tally / Busy but modern. No retraining needed.</p></div>
        <div className="p"><div className="ic"><Icon name="rupee" size={16}/></div><h4>Regional Comfort</h4><p>Rupee symbol everywhere. Indian lakh-crore grouping. Date format DD-MMM-YYYY.</p></div>
      </div>
    </Section>

    {/* ========== COLOR ========== */}
    <Section id="color" title="Color" lead="Seven brand palettes — use the active one from CSS variables, never hardcode. Semantic colors are fixed across all brands.">
      <div className="sub-h">Brand (active: teal)</div>
      <div className="swatch-grid">
        {[['50','#f0fdfa'],['100','#ccfbf1'],['200','#99f6e4'],['500','#14b8a6'],['600','#0d9488'],['700','#0f766e'],['800','#115e59'],['900','#134e4a']].map(([k,v]) => (
          <div className="sw" key={k}><div className="chip" style={{background:v}}/><div className="lbl"><div className="n">brand-{k}</div><div className="h">{v}</div></div></div>
        ))}
      </div>

      <div className="sub-h">Semantic</div>
      <div className="swatch-grid">
        <div className="sw"><div className="chip" style={{background:'#10b981'}}/><div className="lbl"><div className="n">ok-500</div><div className="h">Success · Paid</div></div></div>
        <div className="sw"><div className="chip" style={{background:'#f59e0b'}}/><div className="lbl"><div className="n">warn-500</div><div className="h">Pending · Partial</div></div></div>
        <div className="sw"><div className="chip" style={{background:'#ef4444'}}/><div className="lbl"><div className="n">err-500</div><div className="h">Overdue · Error</div></div></div>
        <div className="sw"><div className="chip" style={{background:'#0891b2'}}/><div className="lbl"><div className="n">info-500</div><div className="h">Informational</div></div></div>
      </div>

      <div className="sub-h">Neutrals</div>
      <div className="swatch-grid">
        <div className="sw"><div className="chip" style={{background:'#f7f8fb', border:'1px solid var(--border)'}}/><div className="lbl"><div className="n">bg</div><div className="h">#f7f8fb</div></div></div>
        <div className="sw"><div className="chip" style={{background:'#ffffff', border:'1px solid var(--border)'}}/><div className="lbl"><div className="n">surface</div><div className="h">#ffffff</div></div></div>
        <div className="sw"><div className="chip" style={{background:'#e4e7ee'}}/><div className="lbl"><div className="n">border</div><div className="h">#e4e7ee</div></div></div>
        <div className="sw"><div className="chip" style={{background:'#0f172a'}}/><div className="lbl"><div className="n">text</div><div className="h">#0f172a</div></div></div>
        <div className="sw"><div className="chip" style={{background:'#475569'}}/><div className="lbl"><div className="n">text-2</div><div className="h">#475569</div></div></div>
        <div className="sw"><div className="chip" style={{background:'#94a3b8'}}/><div className="lbl"><div className="n">text-3</div><div className="h">#94a3b8</div></div></div>
      </div>
    </Section>

    {/* ========== TYPE ========== */}
    <Section id="type" title="Typography" lead="Inter for UI text, JetBrains Mono for numbers and codes. Always use tabular-nums for amounts.">
      <div className="example">
        <div className="type-row"><div className="spec">Page Title · 24/32 · 700</div><div className="sample" style={{fontSize:24,fontWeight:700,lineHeight:'32px',letterSpacing:'-0.01em'}}>New Bill</div></div>
        <div className="type-row"><div className="spec">Section · 18/24 · 600</div><div className="sample" style={{fontSize:18,fontWeight:600,lineHeight:'24px'}}>Customer</div></div>
        <div className="type-row"><div className="spec">Subhead · 16/22 · 600</div><div className="sample" style={{fontSize:16,fontWeight:600}}>Empty Bottles After This Bill</div></div>
        <div className="type-row"><div className="spec">Body · 14/20 · 400</div><div className="sample" style={{fontSize:14}}>Search by mobile or name to find a customer.</div></div>
        <div className="type-row"><div className="spec">Small · 12/16 · 400</div><div className="sample" style={{fontSize:12, color:'var(--text-2)'}}>Auto-saved as draft · 2 minutes ago</div></div>
        <div className="type-row"><div className="spec">Number · 28 · 700 tabular</div><div className="sample num" style={{fontSize:28,fontWeight:700,letterSpacing:'-0.02em'}}>₹48,920</div></div>
        <div className="type-row"><div className="spec">Mono · 12 · tabular</div><div className="sample mono" style={{fontSize:12}}>SPG-2448 · 24AAUFS0029D1ZD</div></div>
      </div>
      <div className="sub-h">Token reference</div>
      <table className="dict-tbl">
        <thead><tr><th>Token</th><th>CSS Variable</th><th>Value</th></tr></thead>
        <tbody>
          <tr><td>Page title</td><td><code>--fs-h1</code></td><td>24px / 700</td></tr>
          <tr><td>Section</td><td><code>--fs-h2</code></td><td>18px / 600</td></tr>
          <tr><td>Body</td><td><code>--fs-body</code></td><td>14px / 400</td></tr>
          <tr><td>Small</td><td><code>--fs-sm</code></td><td>12px / 400</td></tr>
          <tr><td>Mono</td><td><code>--font-mono</code></td><td>JetBrains Mono</td></tr>
        </tbody>
      </table>
    </Section>

    {/* ========== SPACING ========== */}
    <Section id="spacing" title="Spacing Scale" lead="8px base. Use the scale, don't invent values.">
      <div className="example" style={{padding:24}}>
        <div className="sp-row">
          {[4,8,12,16,20,24,32,40,48,64].map(n=>(
            <div key={n} className="sp" style={{width:n, height:40}}>
              <span className="lbl">{n}</span>
            </div>
          ))}
        </div>
      </div>
    </Section>

    {/* ========== RADIUS ========== */}
    <Section id="radius" title="Radius &amp; Shadow" lead="Radius scale by role: inputs/buttons small, cards medium, modals large, badges full.">
      <div className="sub-h">Radius</div>
      <div className="example" style={{padding:24}}>
        <div className="rad-row">
          {[['xs',4],['sm',6],['md',10],['lg',12],['full',40]].map(([k,v])=>(
            <div key={k} style={{textAlign:'center'}}>
              <div className="box" style={{borderRadius:v}}><div className="lbl">--r-{k}</div></div>
              <div style={{fontSize:11, color:'var(--text-2)', marginTop:6}}>{v === 40 ? '999px' : v+'px'}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="sub-h">Elevation</div>
      <div className="example" style={{padding:24, background:'var(--bg)'}}>
        <div style={{display:'flex', gap:24, flexWrap:'wrap'}}>
          {[['sm','Cards'],['md','Popovers'],['lg','Modals'],['xl','Dialogs']].map(([k,use])=>(
            <div key={k} style={{width:140, height:90, background:'var(--surface)', borderRadius:10, boxShadow:`var(--sh-${k})`, display:'grid', placeItems:'center', textAlign:'center'}}>
              <div><div style={{fontFamily:'var(--font-mono)', fontSize:11}}>--sh-{k}</div><div style={{fontSize:11, color:'var(--text-2)', marginTop:4}}>{use}</div></div>
            </div>
          ))}
        </div>
      </div>
    </Section>

    {/* ========== ICONS ========== */}
    <Section id="icons" title="Icons" lead="Custom Lucide-style set. 2px stroke, outlined. 16px inline, 20px in buttons, 24px in navigation.">
      <div className="example" style={{padding:20}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(110px, 1fr))', gap:4}}>
          {['dashboard','users','user','cylinder','doc','plus','pluscircle','rupee','chart','gear','search','bell','x','check','chevright','chevleft','chevdown','chevup','phone','message','edit','trash','printer','download','upload','eye','eyeoff','calendar','filter','menu','more','wifi','cash','card','upi','cheque','credit','home','alert','arrowup','arrowdown','save','palette','box','clock'].map(n=>(
            <div key={n} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:6, padding:'10px 6px', borderRadius:6}}>
              <div style={{color:'var(--text)'}}><Icon name={n} size={20}/></div>
              <div style={{fontSize:10, fontFamily:'var(--font-mono)', color:'var(--text-2)'}}>{n}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="sub-h">Usage</div>
      <p style={{fontSize:13, color:'var(--text-2)'}}>Use <code className="tok">&lt;Icon name="plus" size={16} /&gt;</code>. Stroke inherits <code className="tok">currentColor</code>.</p>
    </Section>

    {/* ========== BUTTONS ========== */}
    <Section id="buttons" title="Buttons" lead="Five variants, three sizes. Always pair primary action with a secondary or ghost escape route.">
      <Ex purpose="Primary action — the single most important thing to do on a screen."
          usage="Save, Submit, Confirm. Only one primary per surface.">
        <button className="btn primary"><Icon name="check" size={14}/> Save Bill</button>
        <button className="btn primary lg"><Icon name="plus" size={16}/> New Bill</button>
        <button className="btn primary sm">Add</button>
      </Ex>
      <Ex purpose="Secondary — supporting action, same visual weight priority as primary."
          usage="Cancel, Back, alternate save (Save Draft). Paired with primary.">
        <button className="btn secondary">Save Draft</button>
        <button className="btn secondary"><Icon name="download" size={14}/> Export</button>
        <button className="btn secondary sm"><Icon name="printer" size={14}/> Print</button>
      </Ex>
      <Ex purpose="Ghost — low-emphasis tertiary. Blends into surface."
          usage="View all links, Cancel on neutral surfaces, inline toggles.">
        <button className="btn ghost">Cancel</button>
        <button className="btn ghost sm">View all <Icon name="chevright" size={12}/></button>
      </Ex>

    <Section id="guide" title={"Do & Don\u2019t"} lead="Guardrails — these mistakes come up most often.">
      <div className="do-dont">
        <div className="col do">
          <h5>Do</h5>
          <ul style={{listStyle:'none', padding:0, margin:0}}>
            <li>Use tabular-nums on every amount and count</li>
            <li>Put primary action on the right of a button group</li>
            <li>Right-align all numeric table columns</li>
            <li>Pair colored badges with a text label</li>
            <li>Auto-save drafts on New Bill every keystroke</li>
            <li>Show keyboard shortcuts next to power actions</li>
            <li>Use <code>fmtINR()</code> for every rupee value</li>
            <li>Confirm destructive actions with a modal</li>

            <li>{"Don\u2019t nest modals"}</li>
            <li>{"Don\u2019t use tooltips to hide required information"}</li>
            <li>{"Don\u2019t use the items-tbl pattern outside New Bill"}</li>
            <li>{"Don\u2019t use more than one primary button per screen"}</li>
            <li>{"Don\u2019t hardcode text — use resource files for i18n"}</li>
            <li>{"Don\u2019t use text smaller than 12px on desktop"}</li>
          </ul>

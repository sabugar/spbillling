<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sp_billing">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>sp_billing</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Unregister any stale Flutter service worker from a previous build and
    // clear its caches, then reload once so this load gets fresh files.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        if (!regs.length) return;
        var hadSw = regs.some(function (r) { return !!r.active; });
        Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }).then(function () {
              if (hadSw && !sessionStorage.getItem('__sw_cleared__')) {
                sessionStorage.setItem('__sw_cleared__', '1');
                location.reload();
              }
            });
          }
        });
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

name: sp_billing
description: "S. P. Gas Agency — Billing App (desktop + mobile)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Persistence
  shared_preferences: ^2.3.3

  # Formatting
  intl: ^0.20.1
  google_fonts: ^6.2.1

  # PDF / printing / files
  printing: ^5.13.4
  url_launcher: ^6.3.1
  file_selector: ^1.0.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
